<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User — AniBase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/index.html">ANI<span>BASE</span></a>
        <div class="d-flex gap-3">
            <a class="nav-link" href="/pages/anime.html">Anime</a>
            <a class="nav-link" href="/pages/characters.html">Characters</a>
            <a class="nav-link" href="/pages/people.html">People</a>
            <a class="nav-link" href="/pages/users.html">Users</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div id="content"><div class="text-center py-5"><div class="spinner-border text-secondary"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
    const username = getParam('username');
    if (!username) window.location.href = '/pages/users.html';

    Promise.all([
        api.getUserByUsername(username),
        api.getUserRatings(username, 0, 10),
        api.getUserFavs(username)
    ]).then(([user, ratings, favs]) => {
        const animeFavs = favs.filter(f => f.fav_type === 'anime');
        const charFavs  = favs.filter(f => f.fav_type === 'character');

        const ratingsTable = ratings.data?.length ? `
            <h5 class="fw-bold mt-4 mb-2">Recent Ratings</h5>
            <table class="table table-sm table-hover">
                <thead class="table-light"><tr><th>Anime ID</th><th>Status</th><th>Score</th><th>Episodes Watched</th></tr></thead>
                <tbody>${ratings.data.map(r => `
                    <tr>
                        <td><a href="/pages/anime-detail.html?id=${r.anime_id}">${r.anime_id}</a></td>
                        <td>${r.status||'—'}</td>
                        <td>${r.score||'—'}</td>
                        <td>${r.num_watched_episodes||'—'}</td>
                    </tr>`).join('')}
                </tbody>
            </table>` : '';

        document.getElementById('content').innerHTML = `
            <div class="row g-4">
                <div class="col-md-3">
                    <div class="card border-0 bg-light p-3 text-center">
                        <div class="display-1">👤</div>
                        <h4 class="fw-bold mt-2">${user.username}</h4>
                        <p class="text-muted mb-1">${user.gender||'—'}</p>
                        <p class="text-muted mb-1">📍 ${user.location||'—'}</p>
                        <p class="text-muted mb-0">Joined: ${user.joined||'—'}</p>
                    </div>
                </div>
                <div class="col-md-9">
                    <div class="row g-3 mb-3">
                        <div class="col-auto">
                            <div class="card border-0 bg-light p-3 text-center">
                                <div class="fs-4 fw-bold">${animeFavs.length}</div>
                                <small class="text-muted">Anime Favs</small>
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="card border-0 bg-light p-3 text-center">
                                <div class="fs-4 fw-bold">${charFavs.length}</div>
                                <small class="text-muted">Character Favs</small>
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="card border-0 bg-light p-3 text-center">
                                <div class="fs-4 fw-bold">${ratings.total||0}</div>
                                <small class="text-muted">Total Ratings</small>
                            </div>
                        </div>
                    </div>
                    ${ratingsTable}
                </div>
            </div>`;
    }).catch(() => showError('content', 'Failed to load user'));
</script>
</body>
</html>
