<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Characters — AniBase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">🎌 AniBase</a>
        <div class="d-flex gap-3">
            <a class="nav-link" href="/pages/anime.html">Anime</a>
            <a class="nav-link" href="/pages/characters.html">Characters</a>
            <a class="nav-link" href="/pages/people.html">People</a>
            <a class="nav-link" href="/pages/users.html">Users</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-2 mb-4">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control" placeholder="Search characters...">
        </div>
        <div class="col-auto">
            <button id="searchBtn" class="btn btn-dark">Search</button>
        </div>
    </div>
    <div id="resultsGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-3"></div>
    <div id="pagination" class="mt-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
    let currentPage = 0;
    const PAGE_SIZE = 24;

    async function load(page = 0) {
        currentPage = page;
        showLoading('resultsGrid');
        const q = document.getElementById('searchInput').value.trim();
        try {
            const data = q
                ? await api.searchCharacters(q, page, PAGE_SIZE)
                : await api.getTopCharacters(page, PAGE_SIZE);
            const items = data.content || [];
            const total = data.page?.totalPages || data.totalPages || 1;
            document.getElementById('resultsGrid').innerHTML = items.map(characterCard).join('');
            renderPagination('pagination', currentPage, total, load);
        } catch(e) {
            showError('resultsGrid', 'Failed to load characters');
        }
    }

    document.getElementById('searchBtn').addEventListener('click', () => load(0));
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') load(0); });
    load(0);
</script>
</body>
</html>
