<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Person — AniBase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">🎌 AniBase</a>
        <div class="d-flex gap-3">
            <a class="nav-link" href="/pages/anime.html">Anime</a>
            <a class="nav-link" href="/pages/characters.html">Characters</a>
            <a class="nav-link" href="/pages/people.html">People</a>
            <a class="nav-link" href="/pages/users.html">Users</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div id="content"><div class="text-center py-5"><div class="spinner-border text-secondary"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
    const id = getParam('id');
    if (!id) window.location.href = '/pages/people.html';

    api.getPersonById(id).then(p => {
        document.getElementById('content').innerHTML = `
            <div class="row g-4">
                <div class="col-md-3 text-center">
                    <img src="${p.imageUrl||'https://via.placeholder.com/225x320'}" class="img-fluid rounded shadow" alt="${p.name}">
                    <div class="mt-3">
                        <div class="fs-5 fw-bold">♥ ${(p.favorites||0).toLocaleString()}</div>
                        <small class="text-muted">favorites</small>
                    </div>
                </div>
                <div class="col-md-9">
                    <h2 class="fw-bold">${p.name}</h2>
                    <p class="text-muted">${[p.givenName, p.familyName].filter(Boolean).join(' ')}</p>
                    <div class="row g-2 mt-1 small">
                        ${p.birthday ? `<div class="col-auto"><strong>Birthday:</strong> ${p.birthday}</div>` : ''}
                        ${p.relevantLocation ? `<div class="col-auto"><strong>Location:</strong> ${p.relevantLocation}</div>` : ''}
                    </div>
                </div>
            </div>`;
    }).catch(() => showError('content', 'Failed to load person'));
</script>
</body>
</html>
